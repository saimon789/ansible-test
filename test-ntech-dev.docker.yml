all:
  children:
    gpu_nodes:
      hosts:
        nvidia-test:
          ansible_connection: docker
      vars:
        gpu_present: true
        nvidia_driver_version: "580-server"
        nvidia_driver_specific_version: ""
        nexus_repo_enabled: true
        nexus_repo_url: "http://172.17.47.165:8081/repository/nvidia-drivers-580/"
        nexus_repo_signed_by: "http://172.17.47.165:8081/repository/apt-releases/apt-keys/nexus-repo.gpg"
        nvidia_container_toolkit_install: true
        nvidia_container_toolkit_repo_url: "https://nvidia.github.io/libnvidia-container/stable/deb/amd64"
        nvidia_container_toolkit_signed_by: "https://nvidia.github.io/libnvidia-container/gpgkey"
        cuda_install: false
        nvidia_dkms_install: true
        containerd_nvidia_runtime: true
        # nvidia_repo / nvidia_repo_key left unset here on purpose: role defaults (nvidia-drivers/defaults/main.yml)
        # compute the official NVIDIA CUDA repo URL from ansible_distribution facts.
