all:
  children:
    k8s:
      children:
        masters:
          hosts:
            master-0:
              ansible_host: 172.17.147.20
            master-1:
              ansible_host: 172.17.147.21
            master-2:
              ansible_host: 172.17.147.22
        ingress:
          hosts:
            ingress-0:
              ansible_host: 172.17.147.23
            ingress-1:
              ansible_host: 172.17.147.24
        cpu_nodes:
          hosts:
            node-cpu-00:
              ansible_host: 172.17.147.34
            node-cpu-01:
              ansible_host: 172.17.147.35
            node-cpu-02:
              ansible_host: 172.17.147.33
          vars:
            k8s_version: "1.27.13"
        gpu_nodes:
          hosts:
            vm-test2:
              ansible_host: 172.17.47.221
          vars:
            gpu_present: true
            nvidia_driver_version: "580-server"
            nvidia_driver_specific_version: ""
            ## Внутренний Nexus-репозиторий с драйверами (основной источник пакетов)
            # Включён по умолчанию, чтобы сохранить прежнее поведение роли; отключите,
            # если для конкретного окружения/хоста этот репозиторий не нужен или недоступен.
            # Репозиторий в Nexus обслуживает только jammy (Ubuntu 22.04) — на остальных релизах
            # (20.04, 24.04) роль сама переключается на официальный репозиторий NVIDIA
            # (nvidia_repo/nvidia_repo_key из defaults/main.yml, ничего переопределять не нужно).
            nexus_repo_enabled: true
            nexus_repo_url: "http://172.17.47.165:8081/repository/nvidia-drivers-580/"
            nexus_repo_signed_by: "http://172.17.47.165:8081/repository/apt-releases/apt-keys/nexus-repo.gpg"

            ## Блок для установки NVIDIA Container Toolkit (доступ к GPU из контейнеров, например Kubernetes)
            nvidia_container_toolkit_install: true
            # URL для репозитория где находится nvidia-container-toolkit
            nvidia_container_toolkit_repo_url: "https://nvidia.github.io/libnvidia-container/stable/deb/amd64"
            # Публичный GPG-ключ репозитория для nvidia-container-toolkit
            nvidia_container_toolkit_signed_by: "https://nvidia.github.io/libnvidia-container/gpgkey"

            cuda_install: false
            # В образе ubuntu-22.04 в OS используется ядро 5.17-oem
            # Он упорно ставит модуль ядра для nvidia версии 535. Поэтому приходится ставить через DKMS
            nvidia_dkms_install: true
            containerd_nvidia_runtime: true
            nvidia_repo: "" #https://developer.download.nvidia.com/compute/cuda/repos/ubuntu2204/x86_64
            nvidia_repo_key: ""
