- name: "Nvidia | Ensure apt keyrings directory exists (Ubuntu < 22.04)"
  ansible.builtin.file:
    path: "/etc/apt/keyrings"
    state: directory
    mode: "0755"
    owner: root
    group: root
  when: >-
    ((nvidia_repo | trim | length > 0) and (nvidia_repo_key | trim | length > 0)) or
    nvidia_container_toolkit_install

- name: "Nvidia | Download repository GPG key (Ubuntu < 22.04)"
  ansible.builtin.get_url:
    url: "{{ nvidia_repo_key | trim }}"
    dest: "/etc/apt/keyrings/nvidia-cuda-repo.asc"
    mode: "0644"
  register: nvidia_repo_key_download
  when: (nvidia_repo | trim | length > 0) and (nvidia_repo_key | trim | length > 0)

- name: "Nvidia | Dearmor repository GPG key (Ubuntu < 22.04)"
  ansible.builtin.command:
    cmd: "gpg --batch --yes --dearmor -o {{ nvidia_repo_keyring_path }} /etc/apt/keyrings/nvidia-cuda-repo.asc"
  changed_when: true
  when: nvidia_repo_key_download.changed

- name: "Nvidia | Add repository (classic sources.list, Ubuntu < 22.04)"
  ansible.builtin.apt_repository:
    repo: "deb [signed-by={{ nvidia_repo_keyring_path }}] {{ nvidia_repo | trim }} /"
    filename: "nvidia-repository"
    state: present
    update_cache: true
  when: (nvidia_repo | trim | length > 0) and (nvidia_repo_key | trim | length > 0)

- name: "Nvidia Container Toolkit | Download repository GPG key (Ubuntu < 22.04)"
  ansible.builtin.get_url:
    url: "{{ nvidia_container_toolkit_signed_by | trim }}"
    dest: "/etc/apt/keyrings/nvidia-container-toolkit.asc"
    mode: "0644"
  register: nvidia_ctk_key_download
  when: nvidia_container_toolkit_install

- name: "Nvidia Container Toolkit | Dearmor repository GPG key (Ubuntu < 22.04)"
  ansible.builtin.command:
    cmd: "gpg --batch --yes --dearmor -o {{ nvidia_container_toolkit_keyring_path }} /etc/apt/keyrings/nvidia-container-toolkit.asc"
  changed_when: true
  when: nvidia_container_toolkit_install and nvidia_ctk_key_download.changed

- name: "Nvidia Container Toolkit | Add apt repository with key (classic sources.list, Ubuntu < 22.04)"
  ansible.builtin.apt_repository:
    repo: "deb [signed-by={{ nvidia_container_toolkit_keyring_path }}] {{ nvidia_container_toolkit_repo_url | trim }} /"
    filename: "nvidia-container-toolkit"
    state: present
    update_cache: true
  register: nvidia_ctk_repo_classic
  when: nvidia_container_toolkit_install
